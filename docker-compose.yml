version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: game-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 2s
    networks:
      - game-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: game-api
    ports:
      - "${API_PORT:-3000}:${API_PORT:-3000}"
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - API_PORT=${API_PORT:-3000}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - game-network

networks:
  game-network:
    driver: bridge
